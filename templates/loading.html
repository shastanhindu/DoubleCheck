<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Analyzing — DoubleCheck</title>
  <style>
    :root {
      --bg:     #0d0d0d;
      --card:   #1a1a1a;
      --border: #2a2a2a;
      --cyan:   #00d4ff;
      --gold:   #c9932a;
      --text:   #e8e8e8;
      --muted:  #888;
      --green:  #00c853;
      --red:    #ff4444;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 48px 52px;
      text-align: center;
      max-width: 460px;
      width: 100%;
    }

    /* Spinner */
    .spinner-wrap { margin-bottom: 28px; }
    .spinner {
      width: 56px; height: 56px;
      border: 4px solid var(--border);
      border-top-color: var(--cyan);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .title {
      font-size: 1.3rem;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 6px;
    }
    .subtitle {
      font-size: 0.88rem;
      color: var(--muted);
      margin-bottom: 28px;
    }

    /* Steps */
    .steps { text-align: left; margin-bottom: 28px; }
    .step {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 9px 14px;
      border-radius: 8px;
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 4px;
      transition: all 0.3s;
    }
    .step .dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--border);
      flex-shrink: 0;
      transition: all 0.3s;
    }
    .step.active {
      color: var(--cyan);
      background: rgba(0,212,255,0.06);
    }
    .step.active .dot {
      background: var(--cyan);
      box-shadow: 0 0 8px var(--cyan);
    }
    .step.done { color: var(--green); }
    .step.done .dot { background: var(--green); }

    /* Progress bar */
    .progress-wrap {
      background: var(--border);
      border-radius: 4px;
      height: 4px;
      overflow: hidden;
      margin-bottom: 20px;
    }
    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--cyan), var(--gold));
      border-radius: 4px;
      width: 0%;
      transition: width 0.5s ease;
    }

    .status-text {
      font-size: 0.8rem;
      color: var(--muted);
    }

    /* Error state */
    .error-box {
      display: none;
      background: rgba(255,68,68,0.08);
      border: 1px solid rgba(255,68,68,0.3);
      border-radius: 10px;
      padding: 16px;
      margin-top: 16px;
      color: var(--red);
      font-size: 0.88rem;
    }
    .retry-btn {
      display: inline-block;
      margin-top: 16px;
      padding: 10px 24px;
      background: var(--gold);
      color: #fff;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 700;
      font-size: 0.88rem;
    }
  </style>
</head>
<body>

<div class="box">
  <div class="spinner-wrap">
    <div class="spinner" id="spinner"></div>
  </div>

  <div class="title">Analyzing File...</div>
  <div class="subtitle">This usually takes 15–40 seconds</div>

  <div class="progress-wrap">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <div class="steps">
    <div class="step active" id="s1"><span class="dot"></span>Parsing APK structure</div>
    <div class="step"        id="s2"><span class="dot"></span>Extracting DEX strings</div>
    <div class="step"        id="s3"><span class="dot"></span>Scanning permissions &amp; APIs</div>
    <div class="step"        id="s4"><span class="dot"></span>Finding network indicators</div>
    <div class="step"        id="s5"><span class="dot"></span>String intelligence scan</div>
    <div class="step"        id="s6"><span class="dot"></span>Calculating verdict</div>
  </div>

  <div class="status-text" id="statusText">Starting analysis...</div>

  <div class="error-box" id="errorBox">
    Analysis failed. The file may be too complex or corrupted.
    <br>
    <a href="/" class="retry-btn">← Try Again</a>
  </div>
</div>

<script>
  var JOB_ID    = "{{ job_id }}";
  var steps     = ["s1","s2","s3","s4","s5","s6"];
  var stepIdx   = 0;
  var progress  = 0;
  var pollCount = 0;
  var MAX_POLLS = 120;  // 120 x 2s = 4 minutes max wait

  var stepMessages = [
    "Parsing APK structure...",
    "Extracting DEX strings...",
    "Scanning permissions & APIs...",
    "Finding network indicators...",
    "String intelligence scan...",
    "Calculating verdict...",
  ];

  // Advance steps automatically (visual progress)
  var stepInterval = setInterval(function() {
    if (stepIdx > 0) {
      document.getElementById(steps[stepIdx-1]).classList.replace('active','done');
    }
    if (stepIdx < steps.length) {
      document.getElementById(steps[stepIdx]).classList.add('active');
      document.getElementById('statusText').textContent = stepMessages[stepIdx];
      stepIdx++;
    }
  }, 5000);

  // Animate progress bar
  var progInterval = setInterval(function() {
    if (progress < 85) {
      progress += Math.random() * 3;
      document.getElementById('progressBar').style.width = Math.min(progress, 85) + '%';
    }
  }, 800);

  // Poll /status every 2 seconds
  function poll() {
    pollCount++;

    if (pollCount > MAX_POLLS) {
      showError();
      return;
    }

    fetch('/status/' + JOB_ID)
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.status === 'done') {
          // Complete progress bar
          clearInterval(stepInterval);
          clearInterval(progInterval);

          // Mark all steps done
          steps.forEach(function(s) {
            var el = document.getElementById(s);
            el.classList.remove('active');
            el.classList.add('done');
          });
          document.getElementById('progressBar').style.width = '100%';
          document.getElementById('statusText').textContent = 'Analysis complete! Loading report...';

          // Redirect to report
          setTimeout(function() {
            window.location.href = '/report/' + JOB_ID;
          }, 600);

        } else if (data.status === 'error') {
          clearInterval(stepInterval);
          clearInterval(progInterval);
          showError();

        } else {
          // Still running — poll again
          setTimeout(poll, 2000);
        }
      })
      .catch(function() {
        // Network error — retry
        setTimeout(poll, 3000);
      });
  }

  function showError() {
    document.getElementById('spinner').style.borderTopColor = '#ff4444';
    document.getElementById('title') && (document.getElementById('title').textContent = 'Analysis Failed');
    document.getElementById('errorBox').style.display = 'block';
    document.getElementById('statusText').textContent = 'An error occurred.';
  }

  // Start polling after 2 seconds
  setTimeout(poll, 2000);
</script>

</html>
