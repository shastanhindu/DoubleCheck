<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Error — DoubleCheck</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0d0d0d; color: #e8e8e8;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 40px 20px;
    }
    .box {
      background: #1a1a1a; border: 1px solid #2a2a2a;
      border-radius: 14px; padding: 48px; text-align: center; max-width: 480px;
    }
    .icon { font-size: 3rem; margin-bottom: 16px; }
    h2 { color: #ff4444; margin-bottom: 12px; font-size: 1.3rem; }
    p { color: #888; line-height: 1.6; margin-bottom: 24px; font-size: 0.9rem; }
    a {
      display: inline-block;
      background: #c9932a; color: #fff;
      padding: 12px 28px; border-radius: 8px;
      text-decoration: none; font-weight: 700; font-size: 0.9rem;
      transition: background 0.2s;
    }
    a:hover { background: #a87520; }
  </style>
</head>
<body>
  <div class="box">
    <div class="icon">⚠️</div>
    <h2>Analysis Error</h2>
    <p>{{ error }}</p>
    <a href="/">← Return to Upload</a>
  </div>
</body>
</html>
